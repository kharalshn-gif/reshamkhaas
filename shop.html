<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reshamkhaas Shop</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        .nav { background: #232e50; padding: 15px; text-align: center; }
        .nav a { color: white; margin: 0 15px; text-decoration: none; font-size: 18px; }
        .filter-btns { text-align: center; margin: 20px 0; }
        .filter-btns button { padding: 10px 20px; cursor: pointer; border: none; background: #232e50; color: white; border-radius: 5px; margin: 5px; transition: 0.3s; }
        .filter-btns button:hover { background: #3b4a7a; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; }
        .product-card { border: 1px solid #ddd; padding: 15px; text-align: center; border-radius: 10px; background: white; }
        .product-image { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; }
        .price { font-weight: bold; color: #d32f2f; display: block; margin: 10px 0; }
        .whatsapp-btn { display: block; background-color: #25D366; color: white; padding: 10px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="nav">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</div>

<div class="filter-btns">
    <button onclick="filterSelection('all')">Show All</button>
    <button onclick="filterSelection('casual')">Casual Wear</button>
    <button onclick="filterSelection('party')">Party Wear</button>
</div>

<div class="product-grid" id="productGrid"></div>

<script>
    let allProducts = [];

    // JSON file se data mangwana
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            allProducts = data;
            renderProducts(allProducts);
        });

    function renderProducts(items) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        items.forEach(item => {
            grid.innerHTML += `
                <div class="product-card">
                    <img src="suit${item.id}.jpeg" class="product-image">
                    <h3>${item.name}</h3>
                    <span class="price">Price: PKR ${item.price}</span>
                    <a href="https://wa.me/923370782529?text=Mujhe ${item.name} chahiye, iski price PKR ${item.price} hai." class="whatsapp-btn">Order on WhatsApp</a>
                </div>
            `;
        });
    }

    function filterSelection(c) {
        if (c == 'all') return renderProducts(allProducts);
        const filtered = allProducts.filter(item => item.category == c);
        renderProducts(filtered);
    }
</script>

</body>
</html>
